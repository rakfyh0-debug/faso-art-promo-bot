<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faso Art Promo V.2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #e63946; --gold: #ffca28; --bg: #0f0f0f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        /* Header avec Score (Point 4) */
        .stats-bar { display: flex; justify-content: space-around; background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-bottom: 3px solid var(--primary); }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 18px; font-weight: bold; color: var(--gold); }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #888; }

        /* Menu Grille (Point 3) */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 18px; border: 1px solid #333; text-align: center; transition: 0.2s; }
        .card:active { transform: scale(0.95); border-color: var(--primary); }
        .icon { font-size: 28px; margin-bottom: 8px; display: block; }
        
        /* Boutons Spéciaux */
        .btn-full { grid-column: span 2; background: linear-gradient(45deg, #ffca28, #ffa000); color: black; font-weight: bold; }
        .premium-badge { position: absolute; top: 10px; right: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-value" id="user-views">0</span>
            <span class="stat-label">Vues</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="user-score">0</span>
            <span class="stat-label">Score</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="user-rank">Débutant</span>
            <span class="stat-label">Rang</span>
        </div>
    </div>

    <div class="grid-menu">
        <div class="card btn-full" onclick="sendAction('premium')">
            <span class="icon">✨</span>
            <span>VITRINE PREMIUM</span>
        </div>
        <div class="card" onclick="sendAction('boost')">
            <span class="icon">🚀</span>
            <span>BOOST FLASH</span>
        </div>
        <div class="card" onclick="sendAction('discover')">
            <span class="icon">🎬</span>
            <span>DÉCOUVRIR</span>
        </div>
        <div class="card" onclick="sendAction('search')">
            <span class="icon">🔍</span>
            <span>RECHERCHE</span>
        </div>
        <div class="card" onclick="sendAction('parrainage')">
            <span class="icon">👥</span>
            <span>PARRAINAGE</span>
        </div>
        <div class="card" onclick="sendAction('settings')">
            <span class="icon">⚙️</span>
            <span>PARAMÈTRES</span>
        </div>
        <div class="card btn-full" style="background: #333; color: white;" onclick="sendAction('admin')">
            <span class="icon">💬</span>
            <span>CONTACT ADMIN</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Simulation de récupération des données (Point 4)
        // Note: En production, ces données viendront de ta DB via main.py
        document.getElementById("user-views").innerText = "1.2K"; 
        
        function sendAction(action) {
            tg.sendData(action);
            tg.close();
        }
    </script>
</body>
</html>
