<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Faso Art Promo</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root { --bg: var(--tg-theme-bg-color, #0f172a); --text: var(--tg-theme-text-color, #ffffff); --btn: var(--tg-theme-button-color, #2563eb); --btn-txt: var(--tg-theme-button-text-color, #ffffff); }
body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
.card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; margin-top: 10px; box-sizing: border-box; }
button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; background: var(--btn); color: var(--btn-txt); cursor: pointer; margin-top: 15px; }
.status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; }
.GRATUIT { background: #64748b; }
.PREMIUM { background: #fbbf24; color: #000; }
.hidden { display: none; }
</style>
</head>
<body>
    <h2 style="text-align:center; color: #2563eb;">FASO ART PROMO</h2>
    <div id="loading" style="text-align:center; margin-top:40px;">Chargement du profil...</div>

    <div id="dashboard" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <b id="userName">Artiste</b>
                <span id="userStatus" class="status-badge">GRATUIT</span>
            </div>
            <p style="font-size: 14px; margin-top:10px;">🏆 Score : <b id="userScore">0</b> | 👁️ Vues : <b id="userViews">0</b></p>
        </div>

        <div class="card">
            <h3 style="margin:0;">✨ Devenir Premium</h3>
            <p style="font-size:12px; opacity:0.7;">1. Payez 2500 FCFA (Orange/Moov)<br>2. Envoyez le reçu ci-dessous</p>
            <input type="text" id="transId" placeholder="ID de Transaction" />
            <input type="file" id="proofFile" accept="image/*" />
            <button id="sendBtn" onclick="submitPayment()">ENVOYER LA PREUVE</button>
        </div>
    </div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const INIT_DATA = tg.initData;

async function init() {
    const res = await fetch("/auth", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({initData: INIT_DATA}) });
    const data = await res.json();
    if(data.success) {
        document.getElementById("userName").innerText = data.name;
        loadData();
    }
}

async function loadData() {
    const res = await fetch("/dashboard", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({initData: INIT_DATA}) });
    const data = await res.json();
    if(data.success) {
        document.getElementById("userStatus").innerText = data.status;
        document.getElementById("userStatus").className = "status-badge " + data.status;
        document.getElementById("userScore").innerText = data.score;
        document.getElementById("userViews").innerText = data.views;
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
    }
}

async function submitPayment() {
    const tid = document.getElementById("transId").value;
    const file = document.getElementById("proofFile").files[0];
    const btn = document.getElementById("sendBtn");

    if(!tid || !file) return tg.showAlert("⚠️ Remplissez tous les champs.");

    btn.disabled = true; btn.innerText = "ENVOI EN COURS...";
    const fd = new FormData();
    fd.append("initData", INIT_DATA); fd.append("trans_id", tid); fd.append("file", file);

    const res = await fetch("/upload_proof", { method: "POST", body: fd });
    const data = await res.json();

    if(data.success) {
        tg.showAlert("✅ Reçu envoyé ! Activation après vérification admin.");
        tg.close();
    } else {
        tg.showAlert("❌ " + data.error);
        btn.disabled = false; btn.innerText = "ENVOYER LA PREUVE";
    }
}
init();
</script>
</body>
</html>
